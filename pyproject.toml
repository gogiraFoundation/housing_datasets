[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]
"joins/*.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["housing_api", "housing_data", "housing_analytics", "streamlit_page_helpers"]
