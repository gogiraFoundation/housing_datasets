name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly: catch upstream ONS layout drift when tests are extended
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff~=0.8"

      - name: Ruff check
        run: ruff check .

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: pytest
        run: pytest -q

      - name: Build processed manifest
        run: python scripts/build_processed_manifest.py
